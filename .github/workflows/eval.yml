name: Eval

# Nightly MCP server evaluation against staging via WandBAgentFactory.
# Results are uploaded as artifacts for review.

on:
  schedule:
    # Daily at 11 PM PT (7 AM UTC)
    - cron: "0 7 * * *"

  workflow_dispatch:
    inputs:
      agents:
        description: 'JSON array of agent configs, e.g. ["claude-mcp","claude-mcp-qa"]'
        required: false
        default: ""
        type: string
      eval_config:
        description: "Eval config file in WandBAgentFactory (e.g. data/evals/mcp-nightly.yaml)"
        required: false
        default: "data/evals/mcp-nightly.yaml"
        type: string
      parallelism:
        description: "Weave parallelism (concurrent tasks)"
        required: false
        default: "15"
        type: string

jobs:
  eval:
    name: "Eval (${{ matrix.variant }})"
    runs-on: ubuntu-latest
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJson(inputs.agents || '["claude-mcp"]') }}

    env:
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

    steps:
      - name: Checkout wandb-mcp-server
        uses: actions/checkout@v4

      - name: Checkout WandBAgentFactory
        uses: actions/checkout@v4
        with:
          repository: wandb/WandBAgentFactory
          ref: main
          token: ${{ secrets.WBAF_PAT }}
          path: wbaf

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        working-directory: wbaf
        run: uv python install

      - name: Install dependencies
        working-directory: wbaf
        run: uv sync

      - name: Configure Weave project
        working-directory: wbaf
        run: |
          printf 'entity: wandb\nproject: mcp-server-ci\n' > wandb_settings.yaml

      - name: Run evaluation
        working-directory: wbaf
        run: |
          PARALLELISM="${{ inputs.parallelism || '15' }}"
          AGENT="${{ matrix.variant }}"
          EVAL_CONFIG="${{ inputs.eval_config || 'data/evals/mcp-nightly.yaml' }}"
          echo "Agent: $AGENT"
          echo "Config: $EVAL_CONFIG"
          echo "Parallelism: $PARALLELISM"
          uv run python -W ignore -m factory.run_eval \
            "$EVAL_CONFIG" \
            --agent "$AGENT" \
            --weave-parallelism "$PARALLELISM" \
            2>&1 | tee eval-output.log

      - name: Extract results summary
        if: always()
        id: results
        working-directory: wbaf
        run: |
          python3 -c "
          import re, json, sys

          log = open('eval-output.log').read()

          summary = {}
          for line in log.splitlines():
              m = re.match(r'^[\w-]+:\s*(\{.+\})\s*$', line)
              if m:
                  try:
                      summary = eval(m.group(1))
                  except Exception:
                      pass

          scorer = summary.get('scorer') or {}
          output = summary.get('output', {})

          passed = scorer.get('passed', {}).get('true_count', 0)
          total = (output.get('succeeded', {}).get('true_count', 0)
                   + output.get('succeeded', {}).get('false_count', 0))
          score_mean = scorer.get('score', {}).get('mean', 0)

          result = {
              'passed': passed,
              'failed': total - passed,
              'total': total,
              'score_mean': round(score_mean, 4),
          }

          print(json.dumps(result, indent=2))
          with open('results-summary.json', 'w') as f:
              json.dump(result, f)
          " || echo '{"passed":0,"failed":0,"total":0,"score_mean":0}' > results-summary.json

      - name: Upload results summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.variant }}
          path: wbaf/results-summary.json
          retention-days: 90
